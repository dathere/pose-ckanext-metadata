name: CKAN Sites Experimental — In-Place Resource Update

on:
  workflow_dispatch:
  schedule:
    # Runs every Sunday at 04:30 UTC
    - cron: '30 4 * * 0'

env:
  CKAN_API_KEY: ${{ secrets.CKAN_API_KEY }}

jobs:
  run-pipeline:
    name: Fetch → Merge → Update resource in-place
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: sites-experimental

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: sites-experimental/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 1: Collect 10 site URLs ─────────────────────────────────────────
      - name: "Step 1 — Collect site URLs (limit 10)"
        run: |
          echo "=== STEP 1: Extracting 10 site URLs ==="
          python 1getSitesURL.py
          if [ ! -f site_urls.csv ]; then
            echo "✗ site_urls.csv not found"
            exit 1
          fi
          echo "✓ site_urls.csv: $(wc -l < site_urls.csv) lines"

      # ── Step 2: Fetch CKAN stats ──────────────────────────────────────────────
      - name: "Step 2 — Fetch CKAN stats for each site"
        run: |
          echo "=== STEP 2: Fetching CKAN stats ==="
          python 2fetchStats.py
          if [ ! -f ckan_stats.csv ]; then
            echo "✗ ckan_stats.csv not found"
            exit 1
          fi
          ROW_COUNT=$(wc -l < ckan_stats.csv)
          if [ "$ROW_COUNT" -lt 2 ]; then
            echo "✗ ckan_stats.csv has no data rows"
            exit 1
          fi
          echo "✓ ckan_stats.csv: $ROW_COUNT lines"

      # ── Step 3: Merge & update resource in-place ─────────────────────────────
      - name: "Step 3 — Merge with existing data and update resource in-place"
        run: |
          echo "=== STEP 3: Updating CKAN resource in-place ==="
          python 3updateResourceInPlace.py
          echo "✓ Resource update complete"

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload CSVs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sites-experimental-inplace-${{ github.run_id }}
          path: |
            sites-experimental/site_urls.csv
            sites-experimental/ckan_stats.csv
          retention-days: 14

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Workflow summary
        if: always()
        run: |
          echo "=== SUMMARY ==="
          echo "Status    : ${{ job.status }}"
          echo "Timestamp : $(date -u)"
          for f in site_urls.csv ckan_stats.csv; do
            [ -f "$f" ] && echo "$f: $(wc -l < $f) lines" || echo "$f: not produced"
          done
